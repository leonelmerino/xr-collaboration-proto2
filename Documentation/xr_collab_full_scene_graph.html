
<!DOCTYPE html>
<html>
<head>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
body { font-family: var(--font-sans, sans-serif); background: transparent; }

#wrap { position: relative; }
canvas { display: block; width: 100%; height: auto; cursor: default; }

.tip {
  position: absolute;
  background: var(--color-background-primary);
  border: 0.5px solid var(--color-border-secondary);
  border-radius: 8px;
  padding: 8px 12px;
  font-size: 11px;
  line-height: 1.55;
  pointer-events: none;
  opacity: 0;
  transition: opacity 0.1s;
  max-width: 220px;
  z-index: 20;
  color: var(--color-text-primary);
}
.tip strong { font-weight: 500; display: block; margin-bottom: 3px; }
.tip span { color: var(--color-text-secondary); }

.legend {
  display: flex; flex-wrap: wrap; gap: 8px 16px;
  padding: 8px 6px 2px;
  font-size: 11px;
  color: var(--color-text-secondary);
  border-top: 0.5px solid var(--color-border-tertiary);
  margin-top: 4px;
}
.li { display: flex; align-items: center; gap: 5px; }
.li-sq { width: 10px; height: 10px; border-radius: 3px; }
.li-ln { width: 22px; height: 2px; border-radius: 1px; }
.li-ds { width: 22px; height: 0; border-top: 2px dashed; }
.li-mat { width: 10px; height: 10px; border-radius: 50%; border: 1.5px solid rgba(0,0,0,0.2); }
</style>
</head>

// ── HELPERS ──────────────────────────────────────────────────────────
function nById(id){ return N.find(n=>n.id===id); }

function edgesOf(node){
  return E.filter(e=>e.f===node.id||e.t===node.id);
}

function edgeColor(tp){
  return {use:'#378ADD', inst:'#1D9E75', inherit:'#D85A30', child:'#888780'}[tp]||'#888';
}

function rr(x,y,w,h,r,fill,stroke,alpha=1){
  ctx.save();
  ctx.globalAlpha = alpha;
  ctx.beginPath();
  ctx.moveTo(x+r,y); ctx.lineTo(x+w-r,y); ctx.arcTo(x+w,y,x+w,y+r,r);
  ctx.lineTo(x+w,y+h-r); ctx.arcTo(x+w,y+h,x+w-r,y+h,r);
  ctx.lineTo(x+r,y+h); ctx.arcTo(x,y+h,x,y+h-r,r);
  ctx.lineTo(x,y+r); ctx.arcTo(x,y,x+r,y,r);
  ctx.closePath();
  if(fill){ctx.fillStyle=fill;ctx.fill();}
  if(stroke){ctx.strokeStyle=stroke;ctx.lineWidth=0.7;ctx.stroke();}
  ctx.restore();
}

function arrowAt(x,y,angle,color,alpha=1){
  ctx.save();
  ctx.globalAlpha=alpha;
  ctx.translate(x,y); ctx.rotate(angle);
  ctx.beginPath();
  ctx.moveTo(0,0); ctx.lineTo(-7,-3.5); ctx.lineTo(-7,3.5);
  ctx.closePath();
  ctx.fillStyle=color; ctx.fill();
  ctx.restore();
}

function edgePoint(n, toward){
  const dx=toward.x-n.x, dy=toward.y-n.y;
  const ang=Math.atan2(dy,dx);
  const hw=n.w/2, hh=n.h/2;
  const tx=Math.abs(hw/(Math.cos(ang)||1e-9));
  const ty=Math.abs(hh/(Math.sin(ang)||1e-9));
  const t=Math.min(Math.abs(tx),Math.abs(ty));
  return {x: n.x+Math.cos(ang)*t, y: n.y+Math.sin(ang)*t, ang};
}

// ── DRAW ─────────────────────────────────────────────────────────────
let hov = null;

function draw(){
  ctx.clearRect(0,0,W,H);

  // lanes
  LANES.forEach(l=>{
    rr(l.x,l.y,l.w,l.h,14,l.col,dark?'rgba(255,255,255,0.05)':'rgba(0,0,0,0.05)');
    ctx.save();
    ctx.font='500 9.5px var(--font-sans,sans-serif)';
    ctx.fillStyle=TS;
    ctx.textAlign='left'; ctx.textBaseline='top';
    ctx.fillText(l.lb.toUpperCase(), l.x+9, l.y+6);
    ctx.restore();
  });

  // edges
  const activeEdges = hov ? edgesOf(hov) : null;
  E.forEach(e=>{
    const A=nById(e.f), B=nById(e.t);
    if(!A||!B) return;
    const isActive = activeEdges && activeEdges.includes(e);
    const alpha = activeEdges ? (isActive ? 1 : 0.08) : 0.45;
    const col = edgeColor(e.tp);

    const pA=edgePoint(A,B), pB=edgePoint(B,A);
    ctx.save();
    ctx.globalAlpha=alpha;
    ctx.strokeStyle=col;
    ctx.lineWidth = isActive ? 1.8 : 1.1;
    if(e.tp==='inst') ctx.setLineDash([5,4]);
    ctx.beginPath(); ctx.moveTo(pA.x,pA.y); ctx.lineTo(pB.x,pB.y); ctx.stroke();
    ctx.setLineDash([]);
    ctx.restore();
    arrowAt(pB.x,pB.y,pA.ang+Math.PI,col,alpha+0.1);

    // edge label when active
    if(isActive && e.lb){
      const mx=(pA.x+pB.x)/2, my=(pA.y+pB.y)/2;
      ctx.save();
      ctx.font='400 9.5px var(--font-sans,sans-serif)';
      const tw=ctx.measureText(e.lb).width;
      ctx.fillStyle=dark?'rgba(20,20,20,0.9)':'rgba(255,255,255,0.92)';
      ctx.fillRect(mx-tw/2-4, my-7, tw+8, 14);
      ctx.fillStyle=TP; ctx.textAlign='center'; ctx.textBaseline='middle';
      ctx.fillText(e.lb, mx, my);
      ctx.restore();
    }
  });

  // nodes
  N.forEach(n=>{
    const pal=PAL[n.type]||PAL.go;
    const isHov=n===hov;
    const isConn=hov && edgesOf(hov).some(e=>e.f===n.id||e.t===n.id);
    const alpha = n.inactive ? 0.45 : 1;
    const dimAlpha = (hov && !isHov && !isConn) ? 0.18 : alpha;

    const x=n.x-n.w/2, y=n.y-n.h/2;
    rr(x,y,n.w,n.h,8,pal.f, isHov||isConn ? pal.s : pal.s+'66', dimAlpha);

    if(dimAlpha>0.18){
      ctx.save();
      ctx.globalAlpha=dimAlpha;
      ctx.font=`500 12px var(--font-sans,sans-serif)`;
      ctx.fillStyle=pal.t;
      ctx.textAlign='center'; ctx.textBaseline='middle';
      ctx.fillText(n.label, n.x, n.sub? n.y-8 : n.y);
      if(n.sub){
        ctx.font=`400 10px var(--font-sans,sans-serif)`;
        ctx.fillStyle=TS;
        ctx.fillText(n.sub, n.x, n.y+8);
      }
      if(n.inactive){
        ctx.font=`400 9px var(--font-sans,sans-serif)`;
        ctx.fillStyle='#D85A30';
        ctx.fillText('OFF', n.x+n.w/2-14, n.y-n.h/2+8);
      }
      ctx.restore();
    }
  });
}

// ── INTERACTION ───────────────────────────────────────────────────────
function pos(ev){
  const r=CVS.getBoundingClientRect();
  const sx=W/r.width, sy=H/(r.width*H/W);
  return {x:(ev.clientX-r.left)*sx, y:(ev.clientY-r.top)*sy};
}

function hitN(x,y){
  for(let i=N.length-1;i>=0;i--){
    const n=N[i];
    if(x>=n.x-n.w/2&&x<=n.x+n.w/2&&y>=n.y-n.h/2&&y<=n.y+n.h/2) return n;
  }
  return null;
}

CVS.addEventListener('mousemove',ev=>{
  const {x,y}=pos(ev);
  const n=hitN(x,y);
  hov=n;
  if(n){
    CVS.style.cursor='pointer';
    tip.style.opacity='1';
    tip.innerHTML=`<strong>${n.label}</strong><span>${n.info||''}</span>`;
    const r=CVS.getBoundingClientRect();
    const sx=r.width/W;
    let tx=(x+18)*sx, ty=(y-10)*sx;
    if(tx+230>r.width) tx=(x-240)*sx;
    if(ty+120>r.width*H/W) ty=(y-130)*sx;
    tip.style.left=tx+'px'; tip.style.top=ty+'px';
  } else {
    CVS.style.cursor='default';
    tip.style.opacity='0';
  }
  draw();
});
CVS.addEventListener('mouseleave',()=>{hov=null;tip.style.opacity='0';draw();});

draw();
</script>
</body>
